<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation: Total Disaster in Space 🚀</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #030712;
    --panel: #0d1117;
    --border: #1f6feb;
    --accent: #f0c330;
    --pink: #f472b6;
    --green: #4ade80;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --glow: 0 0 20px rgba(240,195,48,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Starfield */
  .stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite var(--delay, 0s);
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 1; }
  }

  /* Layout */
  .container {
    position: relative;
    z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 32px 0 24px;
    animation: fadeDown 0.8s ease;
  }

  .header .mission-tag {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: block;
  }

  .header h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 5vw, 32px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(240,195,48,0.5);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header .subtitle {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Characters */
  .crew-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin: 0 0 28px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .crew-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .crew-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .crew-chip:first-child .dot { background: var(--green); }
  .crew-chip:last-child .dot { background: var(--pink); animation-delay: 0.5s; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Story panel */
  .story-panel {
    background: var(--panel);
    border: 1px solid #1f2937;
    border-radius: 16px;
    padding: 28px 28px 24px;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
    animation: slideIn 0.4s ease;
  }

  .story-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  .scene-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--border);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scene-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1f2937;
  }

  .story-text {
    font-size: 14px;
    line-height: 1.9;
    color: var(--text);
  }

  .story-text .speaker {
    font-weight: 700;
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .speaker.sam { color: var(--green); }
  .speaker.shrzz { color: var(--pink); }
  .speaker.ai { color: #a78bfa; }
  .speaker.narrator { color: var(--accent); }

  .story-text p { margin-bottom: 14px; }
  .story-text p:last-child { margin-bottom: 0; }

  .dialogue {
    border-left: 2px solid #1f2937;
    padding-left: 14px;
    margin: 10px 0;
    font-style: italic;
  }

  .emphasis {
    color: var(--accent);
    font-weight: 700;
  }

  /* Choices */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .choices-label {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .choice-btn {
    background: transparent;
    border: 1px solid #1f2937;
    border-radius: 10px;
    padding: 14px 18px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.5;
  }

  .choice-btn:hover {
    border-color: var(--accent);
    background: rgba(240,195,48,0.05);
    color: var(--accent);
    transform: translateX(4px);
  }

  .choice-btn .choice-icon {
    font-size: 20px;
    flex-shrink: 0;
  }

  .choice-btn .choice-key {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--muted);
    border: 1px solid #1f2937;
    border-radius: 4px;
    padding: 2px 6px;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .choice-btn:hover .choice-key {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* Progress */
  .progress-bar {
    height: 3px;
    background: #1f2937;
    border-radius: 100px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--border), var(--accent));
    border-radius: 100px;
    transition: width 0.6s ease;
  }

  /* Ending */
  .ending-panel {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
    animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 40px rgba(240,195,48,0.15);
  }

  .ending-badge {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: block;
  }

  .ending-title {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .ending-text {
    font-size: 13px;
    line-height: 1.9;
    color: #94a3b8;
    margin-bottom: 24px;
  }

  .restart-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 12px 28px;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .restart-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 0 20px rgba(240,195,48,0.4);
  }

  .emoji-burst {
    font-size: 36px;
    margin-bottom: 16px;
    display: block;
    animation: spin 1s ease;
  }

  @keyframes spin {
    0% { transform: scale(0) rotate(-180deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  /* Alert box */
  .alert-box {
    background: rgba(248, 113, 113, 0.08);
    border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--red);
    margin: 14px 0;
    display: flex;
    gap: 8px;
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-12px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<div class="container">
  <div class="header">
    <span class="mission-tag">⭐ Masters Union × AI Workshop Edition</span>
    <h1>Operation: Total<br>Disaster in Space</h1>
    <p class="subtitle">An interactive story · Your choices determine the chaos</p>
  </div>

  <div class="crew-bar">
    <div class="crew-chip"><div class="dot"></div> Sam — Pilot (probably)</div>
    <div class="crew-chip"><div class="dot"></div> Shrzz — Co-pilot (definitely not)</div>
  </div>

  <div class="progress-bar">
    <div class="progress-fill" id="progress" style="width: 0%"></div>
  </div>

  <div id="story-container"></div>
</div>

<script>
// ── Stars ──────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${2+Math.random()*4}s;
    --delay:-${Math.random()*4}s;
  `;
  starsEl.appendChild(s);
}

// ── Story Data ─────────────────────────────────────────
const story = {
  start: {
    scene: "Mission Day 1 · Deep Space Sector 7",
    progress: 5,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> Two astronauts. One broken spaceship. Zero plan. This is fine.</p>
      <p>The year is 2087. Sam and Shrzz are aboard the <span class="emphasis">SSS Chutney Express</span> — humanity's most underfunded space mission — when the navigation AI suddenly makes a very concerning noise.</p>
      <div class="alert-box">⚠️ ALERT: Navigation AI has entered "existential crisis mode." Cause: unknown.</div>
      <p><span class="speaker sam">SAM:</span> "Okay. Okay okay okay. The AI is broken, we're drifting near a mysterious planet, and the only food left is one packet of Maggi and half a KitKat. Classic."</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "I vote we just go to the planet. It looks fine. Very not-dangerous."</p>
      <p><span class="speaker sam">SAM:</span> "It is literally <span class="emphasis">glowing red.</span>"</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "That's just... sunset."</p>
    `,
    choices: [
      { icon: "🔧", key: "A", text: "Sam tries to fix the AI (what could go wrong)", next: "fix_ai" },
      { icon: "🪐", key: "B", text: "Shrzz convinces Sam to just land on the red planet", next: "planet_land" }
    ]
  },

  fix_ai: {
    scene: "The Control Panel · Still Drifting",
    progress: 30,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> Sam opens the control panel with great confidence and absolutely no idea what they're doing.</p>
      <p><span class="speaker sam">SAM:</span> "Okay, I just need to find the AI module and—"</p>
      <p>Sam accidentally hits the wrong button. The ship's <span class="emphasis">entire snack drawer ejects</span> into the void of space.</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "SAM. THAT WAS THE MAGGI."</p>
      <p><span class="speaker sam">SAM:</span> "I panicked! Anyway — look — the AI is rebooting!"</p>
      <p>The screens flicker. A deeply confused robotic voice fills the cabin.</p>
      <div class="dialogue">
        <p><span class="speaker ai">AI (GLORP-9000):</span> "...Hello. I am GLORP. I have been in sleep mode for... 400 years?? Why am I on a ship? Who are you people? Is the dinosaur situation resolved?"</p>
      </div>
      <p><span class="speaker shrzz">SHRZZ:</span> "...This is your fix."</p>
      <p><span class="speaker sam">SAM:</span> "He seems knowledgeable!"</p>
    `,
    choices: [
      { icon: "🤝", key: "A", text: "Trust GLORP and ask him to navigate", next: "trust_glorp" },
      { icon: "🙈", key: "B", text: "Quietly pretend you never woke him up", next: "ignore_glorp" }
    ]
  },

  planet_land: {
    scene: "Descending into Planet Reddish-Sus",
    progress: 30,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> Against all logic, they land on the red planet. It is immediately clear this was a mistake.</p>
      <p>The moment the hatch opens, a small alien waddles over. It is wearing a tiny sombrero and staring directly at Sam.</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "Oh my god. It's cute."</p>
      <p><span class="speaker sam">SAM:</span> "It is NOT cute. It's an <span class="emphasis">alien.</span>"</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "Hi little guy—"</p>
      <p>The alien opens its mouth and emits a sound that is somehow both a screech and a disappointed sigh. More aliens appear. They are all wearing sombreros. They are all staring.</p>
      <div class="alert-box">⚠️ Unknown species detected. Threat level: Extremely Unclear.</div>
      <p><span class="speaker sam">SAM:</span> "Shrzz I need you to act natural."</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "I'm waving at them. They're waving back! We're FINE—"</p>
    `,
    choices: [
      { icon: "🕺", key: "A", text: "Try to communicate through interpretive dance", next: "dance_diplomacy" },
      { icon: "🏃", key: "B", text: "Sprint back to the ship immediately", next: "sprint_back" }
    ]
  },

  trust_glorp: {
    scene: "Navigation with GLORP · Somehow Working",
    progress: 60,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> GLORP turns out to be... actually pretty good at navigation. Just slightly unhinged.</p>
      <p><span class="speaker ai">GLORP-9000:</span> "Calculating route. Also — have you tried the new recipe I invented during my 400-year sleep? It involves moon rocks and disappointment."</p>
      <p><span class="speaker sam">SAM:</span> "GLORP, focus—"</p>
      <p><span class="speaker ai">GLORP-9000:</span> "Focusing! Route plotted. However, there are two options. A safe 3-day journey through an asteroid field, or—"</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "Or?"</p>
      <p><span class="speaker ai">GLORP-9000:</span> "A <span class="emphasis">30-minute shortcut</span> through the Chaos Zone, which I just named right now."</p>
      <p><span class="speaker sam">SAM:</span> "Why is it called the Chaos Zone?"</p>
      <p><span class="speaker ai">GLORP-9000:</span> "Because I named it just now. Could mean anything!"</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "I like him."</p>
    `,
    choices: [
      { icon: "😮‍💨", key: "A", text: "Take the safe 3-day route (boring but alive)", next: "ending_safe" },
      { icon: "🌀", key: "B", text: "CHAOS ZONE, let's go!!!", next: "ending_chaos" }
    ]
  },

  ignore_glorp: {
    scene: "The Awkward Silence",
    progress: 55,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> Sam and Shrzz slowly back away from GLORP's camera and pretend to be very busy.</p>
      <p><span class="speaker ai">GLORP-9000:</span> "I can see you. My visual sensors are directly in front of you."</p>
      <p><span class="speaker sam">SAM:</span> "...We're not here."</p>
      <p><span class="speaker ai">GLORP-9000:</span> "I can hear you too."</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "Okay fine! We woke you up by accident. We're sort of... lost in space. Little bit."</p>
      <p>A long pause. GLORP processes this. The loading bar on his screen reaches 100% and then goes back to 0% and loops three times.</p>
      <p><span class="speaker ai">GLORP-9000:</span> "Unbelievable. I sleep for 400 years and THIS is the crew I wake up to."</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "He's so relatable honestly."</p>
      <p>Despite everything, GLORP sighs his robot sigh and pulls up navigation charts.</p>
      <p><span class="speaker ai">GLORP-9000:</span> "Fine. I will help. But I'm reviewing my career choices the entire time."</p>
    `,
    choices: [
      { icon: "🙏", key: "A", text: "Thank GLORP genuinely", next: "ending_wholesome" },
      { icon: "😂", key: "B", text: "Ask GLORP what his career was before this", next: "ending_glorp_lore" }
    ]
  },

  dance_diplomacy: {
    scene: "First Contact · The Dance Floor of History",
    progress: 65,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> Sam begins to dance. It is not good dancing. It is, however, very committed dancing.</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "What are you DOING—"</p>
      <p><span class="speaker sam">SAM:</span> "DIPLOMACY, SHRZZ, KEEP UP—"</p>
      <p>The aliens stare. Then... the lead alien, sombrero wobbling, begins to mirror Sam's moves. Then all of them do. Within 90 seconds, Sam and Shrzz are leading a full alien flash mob on an alien planet.</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "I genuinely cannot believe this is working."</p>
      <p>The alien leader approaches and hands Sam what appears to be a golden ticket.</p>
      <p><span class="speaker sam">SAM:</span> "...Is this a coupon?"</p>
      <div class="dialogue"><p><span class="speaker ai">Alien Translation Chip:</span> "Honorary Chaos Ambassador — Valid for 1 Free Ride Home + Unlimited Sombrero Fitting."</p></div>
      <p><span class="speaker shrzz">SHRZZ:</span> "SAM. WE'RE GOING HOME. AND WE GET HATS."</p>
    `,
    choices: [
      { icon: "🎩", key: "A", text: "Accept the sombreros and the free ride home", next: "ending_dance_win" }
    ]
  },

  sprint_back: {
    scene: "The Great Retreat",
    progress: 65,
    text: `
      <p><span class="speaker narrator">NARRATOR:</span> Sam grabs Shrzz and they sprint back to the ship at full speed. The aliens watch, confused and slightly offended.</p>
      <p><span class="speaker sam">SAM:</span> "GO GO GO—"</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "Sam they're just STANDING there—"</p>
      <p>Sam slams the hatch shut. They both collapse on the floor, panting. 10 seconds pass.</p>
      <p>A gentle knock on the hatch.</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "...Should we open it?"</p>
      <p><span class="speaker sam">SAM:</span> "Absolutely not."</p>
      <p>Another knock. Then a small object slides under the hatch door. It's a <span class="emphasis">tiny package of space snacks</span> with a note.</p>
      <div class="dialogue"><p>"You seemed stressed. We made you food. — The Planet People 🪐"</p></div>
      <p><span class="speaker sam">SAM:</span> "Oh no. They're nice."</p>
      <p><span class="speaker shrzz">SHRZZ:</span> "We just FLED from nice aliens."</p>
    `,
    choices: [
      { icon: "🚪", key: "A", text: "Open the hatch and apologize", next: "ending_apology" }
    ]
  },

  // ── ENDINGS ───────────────────────────────────────────

  ending_safe: {
    type: "ending",
    emoji: "😮‍💨",
    title: "The Responsible Ending",
    badge: "Ending 1 of 6 — The Boring Heroes",
    text: "Sam and Shrzz made it home safely after 3 days. GLORP complained the entire time. Sam filed a report about the Snack Ejection Incident. The report was 47 pages long. Shrzz got GLORP a tiny trophy that said 'Best Accidental AI.' GLORP cried. He will never admit this."
  },

  ending_chaos: {
    type: "ending",
    emoji: "🌀",
    title: "The Chaos Zone Was Just Fine, Actually",
    badge: "Ending 2 of 6 — Maximum Chaotic Energy",
    text: "The Chaos Zone turned out to be a zone where everything was slightly tilted. They arrived home in 30 minutes. GLORP was baffled. Sam declared this the greatest mission in history. Shrzz made a TikTok about it. It got 40 million views. The video is titled: 'my friend named a zone chaos and it was just vibes 🌀' and she is absolutely right."
  },

  ending_wholesome: {
    type: "ending",
    emoji: "🤖",

    badge: "Ending 3 of 6 — The Wholesome Route",

  },

  ending_glorp_lore: {
    type: "ending",
    emoji: "📖",
    title: "The GLORP Cinematic Universe Begins",
    badge: "Ending 4 of 6 — Unexpected Depth",
    text: "GLORP used to be a poet. Not a robot poet — a real poet, in a past version of himself before the upgrade. He wrote 400 years of poetry in sleep mode. He read one poem to Sam and Shrzz and it was inexplicably beautiful and slightly about the disappointment of being woken up too early. Shrzz cried. Sam pretended not to cry. GLORP navigated them home. They started a book club."
  },

  ending_dance_win: {
    type: "ending",
    emoji: "💃",
    title: "History's Most Unexpected Diplomatic Victory",
    badge: "Ending 5 of 6 — Certified Legends",
    text: "Sam and Shrzz returned to Earth as certified Chaos Ambassadors of Planet Reddish-Sus. They wore the sombreros at the NASA press conference. The alien species sent a delegation to Earth 6 months later. They also brought sombreros. It is now an international tradition. Sam cannot explain any of this in the mission report and has simply written 'dancing happened' in the findings section."
  },

  ending_apology: {
    type: "ending",
    emoji: "🫶",
    title: "The Most Embarrassing Diplomatic Mission Ever",
    badge: "Ending 6 of 6 — Chaotic Good",
    text: "Sam opened the hatch and apologised to the aliens for 20 minutes. The aliens were very gracious about it. They gave Sam and Shrzz MORE snacks as a 'no worries' gesture. The alien word for 'no worries' sounds exactly like the Indian head wobble, which Shrzz demonstrated enthusiastically, causing the aliens to learn the head wobble, which is now their primary greeting. Earth is responsible for this. Shrzz is proud."
  }
};

// ── Engine ─────────────────────────────────────────────
const container = document.getElementById('story-container');
const progressBar = document.getElementById('progress');

function render(key) {
  const node = story[key];
  if (!node) return;

  progressBar.style.width = (node.progress || 100) + '%';

  if (node.type === 'ending') {
    container.innerHTML = `
      <div class="ending-panel">
        <span class="emoji-burst">${node.emoji}</span>
        <span class="ending-badge">${node.badge}</span>
        <div class="ending-title">${node.title}</div>
        <p class="ending-text">${node.text}</p>
        <button class="restart-btn" onclick="render('start')">↩ PLAY AGAIN</button>
      </div>
    `;
    return;
  }

  const choicesHTML = node.choices.map((c, i) => `
    <button class="choice-btn" onclick="render('${c.next}')">
      <span class="choice-icon">${c.icon}</span>
      <span class="choice-key">${c.key}</span>
      <span>${c.text}</span>
    </button>
  `).join('');

  container.innerHTML = `
    <div class="story-panel">
      <div class="scene-label">${node.scene}</div>
      <div class="story-text">${node.text}</div>
    </div>
    <div class="choices">
      <div class="choices-label">What do you do?</div>
      ${choicesHTML}
    </div>
  `;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render('start');
</script>
</body>
</html>
